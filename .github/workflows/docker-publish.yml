name: Publish OpenUSD builder image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional additional image tag to publish, for example 26.05
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openusd-builder
  LOCAL_IMAGE: openusd-builder:ci

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: ./openusd-builder
          file: ./openusd-builder/Dockerfile
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          build-args: |
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}

      - name: Run smoke test
        run: docker run --rm ${{ env.LOCAL_IMAGE }} smoke-test-openusd-builder

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare publish tags
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: publish-tags
        env:
          IMAGE_TAG: ${{ inputs.image_tag || '' }}
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          {
            echo 'tags<<EOF'
            echo "${image}:latest"
            echo "${image}:main"
            echo "${image}:sha-${GITHUB_SHA}"
            if [ -n "${IMAGE_TAG}" ]; then
              echo "${image}:${IMAGE_TAG}"
            fi
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Build and publish Docker image
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: docker/build-push-action@v6
        with:
          context: ./openusd-builder
          file: ./openusd-builder/Dockerfile
          push: true
          tags: ${{ steps.publish-tags.outputs.tags }}
          build-args: |
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
