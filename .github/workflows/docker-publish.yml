name: Publish OpenUSD builder image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional extra image tag, for example 26.05 or 26.08
        required: false
        default: 26.05
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openusd-builder
  LOCAL_IMAGE: openusd-builder:ci

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: ./openusd-builder
          file: ./openusd-builder/Dockerfile
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          build-args: |
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}

      - name: Run smoke test
        run: docker run --rm ${{ env.LOCAL_IMAGE }} smoke-test-openusd-builder

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare publish tags
        id: publish-tags
        env:
          IMAGE_TAG: ${{ inputs.image_tag || '26.05' }}
        run: |
          set -euo pipefail

          image="${REGISTRY}/${IMAGE_NAME}"
          tags=(
            "latest"
            "main"
            "sha-${GITHUB_SHA}"
          )

          if [ -n "${IMAGE_TAG}" ]; then
            tags+=("${IMAGE_TAG}")
          fi

          printf '%s\n' "${tags[@]}" | awk '!seen[$0]++' > /tmp/publish-tags.txt

          {
            echo "image=${image}"
            echo 'tag_list<<EOF'
            cat /tmp/publish-tags.txt
            echo 'EOF'
            echo 'full_tags<<EOF'
            while IFS= read -r tag; do
              echo "${image}:${tag}"
            done < /tmp/publish-tags.txt
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Tag local image for GHCR
        env:
          IMAGE: ${{ steps.publish-tags.outputs.image }}
          TAG_LIST: ${{ steps.publish-tags.outputs.tag_list }}
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            docker tag "${LOCAL_IMAGE}" "${IMAGE}:${tag}"
          done <<< "${TAG_LIST}"

      - name: Push Docker image tags
        env:
          IMAGE: ${{ steps.publish-tags.outputs.image }}
        run: docker image push --all-tags "${IMAGE}"

      - name: Publish summary
        env:
          IMAGE: ${{ steps.publish-tags.outputs.image }}
          FULL_TAGS: ${{ steps.publish-tags.outputs.full_tags }}
        run: |
          {
            echo '## OpenUSD builder image published'
            echo
            echo "Image name: ${IMAGE}"
            echo
            echo 'Pushed tags:'
            while IFS= read -r tag; do
              echo "- ${tag}"
            done <<< "${FULL_TAGS}"
            echo
            echo 'Suggested pull commands:'
            echo '```sh'
            echo "docker pull ${IMAGE}:26.05"
            echo "docker pull ${IMAGE}:sha-${GITHUB_SHA}"
            echo '```'
          } | tee -a "${GITHUB_STEP_SUMMARY}"
